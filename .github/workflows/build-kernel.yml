name: Build Sakura Kernel with SukiSU Ultra

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      defconfig:
        description: 'Defconfig 文件'
        required: true
        type: choice
        options:
          - sakura-perf_defconfig
          - sakura-india-perf_defconfig
        default: sakura-perf_defconfig
      toolchain:
        description: '编译工具链'
        required: true
        type: choice
        options:
          - gcc-4.9
          - gcc-linaro-4.9
          - clang-r383902
        default: gcc-4.9
      version_suffix:
        description: '自定义内核版本后缀 (留空使用默认)'
        required: false
        type: string
        default: '-SukiSU-Ultra'
      anykernel:
        description: '是否打包 AnyKernel3 刷机包'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build Kernel (${{ inputs.defconfig }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      ARCH: arm64
      SUBARCH: arm64
      DEFCONFIG: ${{ inputs.defconfig }}

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Free disk space
      run: |
        sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli \
          microsoft-edge-stable google-chrome-stable firefox powershell mono-devel || true
        sudo apt-get autoremove -y
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential flex libssl-dev libelf-dev \
          python3 zip unzip curl wget git ccache

    - name: Setup ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ inputs.defconfig }}-${{ inputs.toolchain }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ inputs.defconfig }}-${{ inputs.toolchain }}-

    - name: Configure ccache
      run: |
        ccache --max-size=4G
        ccache --set-config=compression=true
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

    - name: Setup GCC 4.9 toolchain
      if: inputs.toolchain == 'gcc-4.9'
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
          -b ndk-release-r21 $GITHUB_WORKSPACE/toolchain/gcc-aarch64
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
          -b ndk-release-r21 $GITHUB_WORKSPACE/toolchain/gcc-arm32
        echo "CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin/aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/toolchain/gcc-arm32/bin/arm-linux-androideabi-" >> $GITHUB_ENV
        echo "CC=ccache $GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin/aarch64-linux-android-gcc" >> $GITHUB_ENV

    - name: Setup Linaro GCC 4.9 toolchain
      if: inputs.toolchain == 'gcc-linaro-4.9'
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        wget -q https://releases.linaro.org/components/toolchain/binaries/4.9-2017.01/aarch64-linux-gnu/gcc-linaro-4.9.4-2017.01-x86_64_aarch64-linux-gnu.tar.xz
        tar -xf gcc-linaro-4.9.4-2017.01-x86_64_aarch64-linux-gnu.tar.xz -C $GITHUB_WORKSPACE/toolchain
        echo "CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/gcc-linaro-4.9.4-2017.01-x86_64_aarch64-linux-gnu/bin/aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "CC=ccache $GITHUB_WORKSPACE/toolchain/gcc-linaro-4.9.4-2017.01-x86_64_aarch64-linux-gnu/bin/aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - name: Setup Clang + GCC toolchain
      if: inputs.toolchain == 'clang-r383902'
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
          -b ndk-release-r21 $GITHUB_WORKSPACE/toolchain/gcc-aarch64
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
          -b ndk-release-r21 $GITHUB_WORKSPACE/toolchain/gcc-arm32
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r383902.tar.gz
        mkdir -p $GITHUB_WORKSPACE/toolchain/clang
        tar -xzf clang-r383902.tar.gz -C $GITHUB_WORKSPACE/toolchain/clang
        echo "PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH" >> $GITHUB_ENV
        echo "CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin/aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=$GITHUB_WORKSPACE/toolchain/gcc-arm32/bin/arm-linux-androideabi-" >> $GITHUB_ENV
        echo "CC=ccache clang" >> $GITHUB_ENV
        echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

    - name: Create KernelSU symlink
      run: |
        ln -sf ../KernelSU/kernel drivers/kernelsu
        ls -la drivers/kernelsu/Kconfig

    - name: Apply version suffix
      if: inputs.version_suffix != ''
      run: |
        echo 'CONFIG_LOCALVERSION="${{ inputs.version_suffix }}"' >> arch/arm64/configs/${{ inputs.defconfig }}

    - name: Generate defconfig
      run: |
        mkdir -p out
        if [ -n "$CLANG_TRIPLE" ]; then
          make O=out ARCH=arm64 CC="$CC" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" ${{ inputs.defconfig }}
        else
          make O=out ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" ${{ inputs.defconfig }}
        fi

    - name: Build kernel
      run: |
        set -e
        START=$(date +%s)

        if [ -n "$CLANG_TRIPLE" ]; then
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="$CC" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" \
            2>&1 | tee build.log
        else
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC="$CC" CROSS_COMPILE="$CROSS_COMPILE" \
            2>&1 | tee build.log
        fi

        END=$(date +%s)
        echo "BUILD_TIME=$((END - START))" >> $GITHUB_ENV

        # Check if Image.gz-dtb was built
        if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          echo "Kernel built successfully in $((END - START)) seconds"
        else
          echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          echo "Build failed: Image.gz-dtb not found"
          tail -100 build.log
          exit 1
        fi

    - name: Clone AnyKernel3
      if: inputs.anykernel && env.BUILD_SUCCESS == 'true'
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        # Clean example files
        rm -rf AnyKernel3/.git AnyKernel3/modules AnyKernel3/patch AnyKernel3/ramdisk

    - name: Configure AnyKernel3
      if: inputs.anykernel && env.BUILD_SUCCESS == 'true'
      run: |
        printf '%s\n' \
          '# AnyKernel3 Ramdisk Mod Script' \
          '# osm0sis @ xda-developers' \
          '## AnyKernel setup' \
          "properties() { '" \
          'kernel.string=SukiSU Ultra Kernel for Sakura (3.18)' \
          'do.devicecheck=1' \
          'do.modules=0' \
          'do.systemless=1' \
          'do.cleanup=1' \
          'do.cleanuponabort=0' \
          'device.name1=sakura' \
          'device.name2=sakura_india' \
          'device.name3=daisy' \
          'supported.versions=' \
          'supported.patchlevels=' \
          "'; } # end properties" \
          'block=/dev/block/bootdevice/by-name/boot;' \
          'is_slot_device=0;' \
          'ramdisk_compression=auto;' \
          'patch_vbmeta_flag=auto;' \
          '. tools/ak3-core.sh;' \
          'dump_boot;' \
          'write_boot;' \
          > AnyKernel3/anykernel.sh

    - name: Package AnyKernel3 zip
      if: inputs.anykernel && env.BUILD_SUCCESS == 'true'
      run: |
        cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        cd AnyKernel3
        TIMESTAMP=$(date +%Y%m%d-%H%M)
        ZIP_NAME="SukiSU-Ultra-sakura-3.18.120-${TIMESTAMP}.zip"
        zip -r9 "../${ZIP_NAME}" * -x '*.git*'
        echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
        cd ..

    - name: Upload Image.gz-dtb
      if: env.BUILD_SUCCESS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Image.gz-dtb
        path: out/arch/arm64/boot/Image.gz-dtb
        compression-level: 9

    - name: Upload AnyKernel3 zip
      if: inputs.anykernel && env.BUILD_SUCCESS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}
        compression-level: 0

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        compression-level: 9

    - name: Build Summary
      if: always()
      run: |
        echo "========================================"
        echo "         Kernel Build Summary           "
        echo "========================================"
        echo "Kernel        : 3.18.120 (arm64)"
        echo "Device        : Xiaomi Redmi 6 Pro (sakura)"
        echo "Defconfig     : ${{ inputs.defconfig }}"
        echo "Toolchain     : ${{ inputs.toolchain }}"
        echo "KernelSU      : SukiSU Ultra (builtin, manual hook)"
        echo "Build Time    : ${BUILD_TIME:-N/A}s"
        echo "Build Status  : ${BUILD_SUCCESS:-unknown}"
        echo "ccache stats  :"
        ccache --show-stats || true
        echo "========================================"
